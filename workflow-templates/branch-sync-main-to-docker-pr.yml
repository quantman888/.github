name: Branch Sync / Main to Docker PR

on:
  push:
    branches:
      - $default-branch
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  open-sync-pr:
    uses: quantman888/workflow-reusable/.github/workflows/branch-sync-pr.reusable.yml@73d95ec5d3d0b1d3cbf78e99e1a8afd2cac8caec
    with:
      source_branch: $default-branch
      target_branch: docker
      pr_title: "chore(sync): merge $default-branch into docker"
      pr_body: "Automated branch sync PR from the default branch into docker."
      auto_resolve_theirs_paths: ""
    secrets:
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      RUNNER_PROBE_TOKEN: ${{ secrets.RUNNER_PROBE_TOKEN }}
