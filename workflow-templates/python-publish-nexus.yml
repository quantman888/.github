name: Python Publish To Nexus

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload built distributions to Nexus"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish-python-package:
    uses: quantman888/.github/.github/workflows/python-package-publish.reusable.yml@v1
    with:
      PYTHON_PACKAGE_REPOSITORY_URL: ${{ vars.PYTHON_PACKAGE_REPOSITORY_URL }}
      PYTHON_PACKAGE_SIMPLE_URL: ${{ vars.PYTHON_PACKAGE_SIMPLE_URL }}
      PYTHON_PUSH_PACKAGE: ${{ github.event.inputs.publish == 'true' }}
      PYTHON_SKIP_EXISTING: true
      PYTHON_VERSION: "3.14"
      PYTHON_TEST_COMMAND: |
        python -X utf8 -m pip install --upgrade ".[s3]"
        python -X utf8 -m unittest discover -s tests -v
      INFISICAL_DOMAIN: ${{ vars.INFISICAL_DOMAIN }}
      INFISICAL_PROJECT_SLUG: ${{ vars.INFISICAL_PROJECT_SLUG }}
      INFISICAL_ENV_SLUG: ${{ vars.INFISICAL_ENV_SLUG }}
      INFISICAL_SECRET_PATH: ${{ vars.INFISICAL_SECRET_PATH }}
      INFISICAL_IDENTITY_ID: ${{ vars.INFISICAL_PUBLISH_IDENTITY_ID }}
      INFISICAL_OIDC_AUDIENCE: ${{ vars.INFISICAL_OIDC_AUDIENCE }}
    secrets:
      nexus_username: ${{ secrets.NEXUS_USERNAME }}
      nexus_password: ${{ secrets.NEXUS_PASSWORD }}
