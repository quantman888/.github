name: Fork Sync / Upstream Main

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  sync-upstream:
    uses: quantman888/workflow-reusable/.github/workflows/fork-sync.reusable.yml@73d95ec5d3d0b1d3cbf78e99e1a8afd2cac8caec
    with:
      target_branch: $default-branch
      upstream_repo: upstream-owner/upstream-repo
      upstream_branch: main
      force_reset: false
    secrets:
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      RUNNER_PROBE_TOKEN: ${{ secrets.RUNNER_PROBE_TOKEN }}
